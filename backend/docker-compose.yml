version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8090:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    restart: always

volumes:
  static_volume:
  media_volume:
